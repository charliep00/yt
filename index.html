<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <title>Math Test Revision Games</title>
  <style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a2e, #0f0f0f);
    color: white;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 15px;
    background: rgba(20, 20, 20, 0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-size: 20px;
    font-weight: bold;
  }

  .logo {
    width: 28px;
    height: 28px;
  }

  .feed {
    padding: 25px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .card {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 10px;
    backdrop-filter: blur(12px);
    transition: 0.3s ease;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
  }

  iframe {
    width: 100%;
    height: 200px;
    border-radius: 12px;
    border: none;
  }

  h3 {
    font-size: 14px;
    margin: 10px 5px 5px;
    color: #ddd;
  }
  </style>
</head>
<body>

<header>
  <svg class="logo" viewBox="0 0 24 24" fill="red">
    <path d="M10 15l5.19-3L10 9v6zm11.5-3c0-1.3-.1-2.2-.3-3
    -.2-.9-.7-1.6-1.5-1.8C18.2 6 12 6 12 6s-6.2 0-7.7.4
    c-.8.2-1.3.9-1.5 1.8C2.6 9.8 2.5 10.7 2.5 12s.1 2.2.3 3
    c.2.9.7 1.6 1.5 1.8C5.8 17 12 17 12 17s6.2 0 7.7-.4
    c.8-.2 1.3-.9 1.5-1.8.2-.8.3-1.7.3-3z"/>
  </svg>
  YouTube Feed+
</header>

<div class="feed" id="feed"></div>

<script>

async function loadVideos() {
  try {
    const res = await fetch("https://youtube-reco.charlieprenticemc.workers.dev/feed");
    const data = await res.json();

    console.log("WORKER DATA:", data);

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    if (!data.items) {
      feed.innerHTML = "<p style='color:red;'>Worker returned no items</p>";
      return;
    }

    data.items.forEach(video => {
      const videoId = video.id;
      const title = video.snippet.title;

      const div = document.createElement("div");
      div.className = "card";

      const category = getCategory(title);

      div.innerHTML = `
        <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
        <h3>${title}</h3>
      `;

      div.onclick = () => trackVideo(category);

      feed.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    document.getElementById("feed").innerHTML =
      "<p style='color:red;'>Failed to load feed</p>";
  }
}

loadVideos();

loadVideos();
</script>
<script>
let userProfile = JSON.parse(localStorage.getItem("profile")) || {
  categories: {}
};

function saveProfile() {
  localStorage.setItem("profile", JSON.stringify(userProfile));
}

function trackVideo(category) {
  if (!userProfile.categories[category]) {
    userProfile.categories[category] = 0;
  }
  userProfile.categories[category] += 1;
  saveProfile();
}

function getTopCategory() {
  let top = "all";
  let max = 0;

  for (let c in userProfile.categories) {
    if (userProfile.categories[c] > max) {
      max = userProfile.categories[c];
      top = c;
    }
  }
  return top;
}
</script>
<script>
function getCategory(title) {
  title = title.toLowerCase();

  if (title.includes("music")) return "music";
  if (title.includes("game") || title.includes("minecraft")) return "gaming";
  if (title.includes("tech") || title.includes("ai")) return "tech";
  if (title.includes("news")) return "news";

  return "general";
}
</script>
  
</body>
</html>
