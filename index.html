<!DOCTYPE html>
<html>
<head>
<title>Sci Calculator</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }

/* CALC */
#lockScreen {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
}

.calc {
  width:95vw;
  max-width:420px;
  background:#1c1c1c;
  padding:20px;
  border-radius:20px;
}

.display {
  background:black;
  color:#00ff6a;
  font-size:32px;
  padding:15px;
  text-align:right;
  margin-bottom:15px;
}

.buttons {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.btn {
  padding:18px;
  text-align:center;
  background:#333;
  border-radius:10px;
  cursor:pointer;
}

.orange { background:#ff9500; }
.dark { background:#2a2a2a; }

/* APP */
#app { display:none; }

header {
  display:flex;
  gap:10px;
  padding:10px;
  background:#181818;
}

.logo { color:red; cursor:pointer; }

input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#222;
  color:white;
}

button {
  background:red;
  border:none;
  color:white;
  padding:10px;
  border-radius:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:15px;
  padding:20px;
}

.thumb {
  width:100%;
  border-radius:10px;
}

#watchView { display:none; padding:20px; }
</style>
</head>

<body>

<!-- CALCULATOR -->
<div id="lockScreen">
<div class="calc">
<div id="display" class="display">0</div>

<div class="buttons">
<div class="btn dark" onclick="clearDisplay()">C</div>
<div class="btn dark" onclick="press('/')">÷</div>
<div class="btn dark" onclick="press('*')">×</div>
<div class="btn orange" onclick="press('-')">−</div>

<div class="btn" onclick="press(7)">7</div>
<div class="btn" onclick="press(8)">8</div>
<div class="btn" onclick="press(9)">9</div>
<div class="btn orange" onclick="press('+')">+</div>

<div class="btn" onclick="press(4)">4</div>
<div class="btn" onclick="press(5)">5</div>
<div class="btn" onclick="press(6)">6</div>
<div class="btn dark" onclick="square()">x²</div>

<div class="btn" onclick="press(1)">1</div>
<div class="btn" onclick="press(2)">2</div>
<div class="btn" onclick="press(3)">3</div>
<div class="btn dark" onclick="sqrt()">√</div>

<div class="btn" onclick="press(0)">0</div>
<div class="btn" onclick="press('.')">.</div>
<div class="btn orange" onclick="calculate()">=</div>
<div class="btn orange" onclick="tryUnlock()">ENTER</div>
</div>
</div>
</div>

<!-- APP -->
<div id="app">

<header>
<div class="logo" onclick="goHome()">YouTube+</div>
<input id="searchInput" placeholder="Search" onkeydown="if(event.key==='Enter') search()">
<button onclick="search()">Search</button>
</header>

<div id="feed" class="grid"></div>

<div id="watchView">
<iframe id="player" width="100%" height="400"></iframe>
<h2 id="title"></h2>
</div>

</div>

<script>
const API = "https://youtube-reco.charlieprenticemc.workers.dev";

let clientId = localStorage.getItem("cid");
if (!clientId) {
  clientId = crypto.randomUUID();
  localStorage.setItem("cid", clientId);
}

/* CALC */
let input="";

function press(v){
  input += v;
  update();
}

function update(){
  document.getElementById("display").innerText = input || "0";
}

function clearDisplay(){
  input="";
  update();
}

function calculate(){
  try {
    input = eval(input).toString();
  } catch {
    input="";
  }
  update();
}

function square(){
  try { input = (eval(input)**2).toString(); } catch {}
  update();
}

function sqrt(){
  try { input = Math.sqrt(eval(input)).toString(); } catch {}
  update();
}

function tryUnlock(){
  if(input === "9999"){
    unlock();
  } else {
    input="";
    update();
  }
}

function unlock(){
  document.getElementById("lockScreen").style.display="none";
  document.getElementById("app").style.display="block";
  loadHome();
}

/* API */
async function get(path){
  const res = await fetch(API + path);
  return await res.json();
}

function vid(v){
  return v.id || v.id?.videoId || "";
}

function render(items){
  const feed=document.getElementById("feed");
  feed.innerHTML="";

  if(!items || items.length===0){
    feed.innerHTML="<h2>No videos found</h2>";
    return;
  }

  items.forEach(v=>{
    const id=vid(v);
    if(!id) return;

    const div=document.createElement("div");

    div.innerHTML=`
      <img class="thumb" src="${v.snippet.thumbnails.medium.url}">
      <p>${v.snippet.title}</p>
    `;

    div.onclick=()=>watch(v);

    feed.appendChild(div);
  });
}

/* HOME */
async function loadHome(){
  const data=await get(`/?mode=home&clientId=${clientId}`);
  render(data.items);
}

/* SEARCH */
async function search(){
  const q=document.getElementById("searchInput").value;
  if(!q) return;

  const data=await get(`/?mode=search&q=${encodeURIComponent(q)}&clientId=${clientId}`);
  render(data.items);
}

/* WATCH */
async function watch(v){
  const id=vid(v);

  document.getElementById("feed").style.display="none";
  document.getElementById("watchView").style.display="block";

  document.getElementById("player").src =
    "https://www.youtube.com/embed/"+id;

  document.getElementById("title").innerText = v.snippet.title;

  await fetch(`${API}/?mode=watch&clientId=${clientId}&videoId=${id}&title=${encodeURIComponent(v.snippet.title)}`);
}

/* HOME BTN */
function goHome(){
  document.getElementById("watchView").style.display="none";
  document.getElementById("feed").style.display="grid";
  loadHome();
}
</script>

</body>
</html>
