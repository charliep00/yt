<!DOCTYPE html>
<html>
<head>
  <title>Charlie's tuff youtube unblocker</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      font-size: 20px;
      background: #181818;
      position: sticky;
      top: 0;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    .feed {
      flex: 2;
    }

    .shorts {
      flex: 1;
      max-width: 300px;
      position: sticky;
      top: 60px;
      height: 90vh;
      overflow-y: auto;
    }

    .video-card {
      margin-bottom: 20px;
      background: #181818;
      padding: 10px;
      border-radius: 10px;
    }

    iframe {
      width: 100%;
      height: 250px;
      border-radius: 10px;
    }

    .shorts iframe {
      height: 500px;
    }

    h3 {
      margin: 10px 0;
    }

  </style>
</head>
<body>

<header>My YouTube Feed</header>

<div class="container">

  <!-- MAIN FEED -->
  <div class="feed">

    <div class="video-card">
      <h3>Video 1</h3>
      <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
    </div>

    <div class="video-card">
      <h3>Video 2</h3>
      <iframe src="https://www.youtube.com/embed/3JZ_D3ELwOQ" allowfullscreen></iframe>
    </div>

    <div class="video-card">
      <h3>Video 3</h3>
      <iframe src="https://www.youtube.com/embed/tgbNymZ7vqY" allowfullscreen></iframe>
    </div>

  </div>

  <!-- SHORTS -->
  <div class="shorts">

    <h3>Shorts</h3>

    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/9bZkp7q19f0" allowfullscreen></iframe>
    </div>

    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/kJQP7kiw5Fk" allowfullscreen></iframe>
    </div>

    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/6Dh-RL__uN4" allowfullscreen></iframe>
    </div>

  </div>

</div>

</body>
</html>
