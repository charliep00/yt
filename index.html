<!DOCTYPE html>
<html>
<head>
  <title>Sci Calculator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    /* LOCK SCREEN */
    #lockScreen {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
    }

    .calc {
      width: 95vw;
      max-width: 420px;
      background: #1c1c1c;
      padding: 20px;
      border-radius: 20px;
    }

    .display {
      background: black;
      color: #00ff6a;
      font-size: 34px;
      padding: 15px;
      text-align: right;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .btn {
      padding: 18px;
      text-align: center;
      border-radius: 10px;
      cursor: pointer;
      background: #333;
    }

    .orange { background: #ff9500; }
    .dark { background: #2a2a2a; }

    /* APP */
    #app { display: none; }

    header {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #181818;
      position: sticky;
      top: 0;
    }

    .logo {
      color: red;
      font-weight: bold;
      cursor: pointer;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      background: red;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 10px;
    }

    /* HOME GRID */
    .feed {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 180px;
      border-radius: 10px;
    }

    /* WATCH PAGE (YouTube style) */
    #watchPage {
      display: none;
      padding: 20px;
    }

    #watchVideo {
      width: 100%;
      height: 60vh;
      border-radius: 12px;
    }

    .back {
      margin-bottom: 10px;
      cursor: pointer;
      color: #aaa;
    }
  </style>
</head>

<body>

<!-- CALCULATOR -->
<div id="lockScreen">
  <div class="calc">
    <div id="display" class="display">0</div>

    <div class="buttons">
      <div class="btn dark" onclick="clearDisplay()">C</div>
      <div class="btn dark" onclick="press('/')">÷</div>
      <div class="btn dark" onclick="press('*')">×</div>
      <div class="btn orange" onclick="press('-')">−</div>

      <div class="btn" onclick="press(7)">7</div>
      <div class="btn" onclick="press(8)">8</div>
      <div class="btn" onclick="press(9)">9</div>
      <div class="btn orange" onclick="press('+')">+</div>

      <div class="btn" onclick="press(4)">4</div>
      <div class="btn" onclick="press(5)">5</div>
      <div class="btn" onclick="press(6)">x²</div>
      <div class="btn dark" onclick="sqrt()">√</div>

      <div class="btn" onclick="press(1)">1</div>
      <div class="btn" onclick="press(2)">2</div>
      <div class="btn" onclick="press(3)">3</div>
      <div class="btn orange" onclick="calculate()">=</div>

      <div class="btn" onclick="press(0)">0</div>
      <div class="btn orange" onclick="unlock()">ENTER</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">

<header>
  <div class="logo" onclick="goHome()">YouTube+</div>
  <input id="searchInput">
  <button onclick="search()">Search</button>
</header>

<!-- HOME -->
<div id="home" class="feed"></div>

<!-- WATCH -->
<div id="watchPage">
  <div class="back" onclick="goHome()">← Back</div>
  <iframe id="watchVideo"></iframe>
</div>

</div>

<script>

let input = "";

function press(v) {
  input += v;
  document.getElementById("display").innerText = input || "0";
  if (input === "9999") unlock();
}

function clearDisplay() {
  input = "";
  document.getElementById("display").innerText = "0";
}

function calculate() {
  input = eval(input).toString();
  document.getElementById("display").innerText = input;
}

function sqrt() {
  input = Math.sqrt(eval(input)).toString();
  document.getElementById("display").innerText = input;
}

function unlock() {
  document.getElementById("lockScreen").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadHome();
}

/* PROFILE */
let profile = JSON.parse(localStorage.getItem("profile")) || {
  searches: {}
};

function save() {
  localStorage.setItem("profile", JSON.stringify(profile));
}

/* FETCH */
async function fetchVideos(q="") {
  const res = await fetch(
    "https://youtube-reco.charlieprenticemc.workers.dev/feed?q=" + q
  );
  const data = await res.json();
  return data.items || [];
}

/* HOME */
async function loadHome() {
  const feed = document.getElementById("home");
  feed.innerHTML = "";

  const keys = Object.entries(profile.searches || {})
    .sort((a,b)=>b[1]-a[1])
    .slice(0,3);

  let vids = [];

  for (let k of keys) {
    const v = await fetchVideos(k[0]);
    vids = vids.concat(v);
  }

  render(vids);
}

/* RENDER */
function render(videos) {
  const feed = document.getElementById("home");
  feed.innerHTML = "";

  videos.forEach(v => {
    const id = v.id.videoId;
    const title = v.snippet.title;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <iframe src="https://www.youtube.com/embed/${id}"></iframe>
      <p>${title}</p>
    `;

    div.onclick = () => openWatch(id, title);

    feed.appendChild(div);
  });
}

/* WATCH PAGE */
function openWatch(id, title) {
  document.getElementById("home").style.display = "none";
  document.getElementById("watchPage").style.display = "block";

  document.getElementById("watchVideo").src =
    "https://www.youtube.com/embed/" + id;

  fetch(
    "https://youtube-reco.charlieprenticemc.workers.dev/feed?watch=" +
    encodeURIComponent(title)
  );

  profile.searches[title] = (profile.searches[title] || 0) + 1;
  save();
}

/* SEARCH */
async function search() {
  const q = document.getElementById("searchInput").value;
  if (!q) return;

  profile.searches[q] = (profile.searches[q] || 0) + 1;
  save();

  const vids = await fetchVideos(q);
  render(vids);
}

/* HOME BUTTON */
function goHome() {
  document.getElementById("watchPage").style.display = "none";
  document.getElementById("home").style.display = "grid";
  loadHome();
}

</script>

</body>
</html>
