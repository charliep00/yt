<!DOCTYPE html>
<html>
<head>
  <title>Sci Calculator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
    }

    #lockScreen {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .calc {
      width: 90vw;
      max-width: 400px;
      background: #1c1c1c;
      padding: 20px;
      border-radius: 20px;
    }

    .display {
      background: black;
      color: lime;
      font-size: 32px;
      padding: 15px;
      text-align: right;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .btn {
      padding: 18px;
      background: #333;
      text-align: center;
      border-radius: 10px;
      cursor: pointer;
    }

    .btn.orange { background: #ff9500; }
    .btn.dark { background: #222; }

    #app { display: none; }

    header {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #111;
    }

    .logo {
      color: red;
      cursor: pointer;
      font-weight: bold;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      background: red;
      border: none;
      border-radius: 20px;
      padding: 10px;
      color: white;
      cursor: pointer;
    }

    .feed {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      padding: 15px;
      gap: 15px;
    }

    iframe {
      width: 100%;
      height: 180px;
    }
  </style>
</head>

<body>

<!-- LOCK -->
<div id="lockScreen">
  <div class="calc">
    <div id="display" class="display">0</div>

    <div class="buttons">
      <div class="btn dark" onclick="clearDisplay()">C</div>
      <div class="btn dark" onclick="press('/')">÷</div>
      <div class="btn dark" onclick="press('*')">×</div>
      <div class="btn orange" onclick="press('-')">-</div>

      <div class="btn" onclick="press(7)">7</div>
      <div class="btn" onclick="press(8)">8</div>
      <div class="btn" onclick="press(9)">9</div>
      <div class="btn orange" onclick="press('+')">+</div>

      <div class="btn" onclick="press(4)">4</div>
      <div class="btn" onclick="press(5)">5</div>
      <div class="btn" onclick="press(6)">6</div>
      <div class="btn dark" onclick="square()">x²</div>

      <div class="btn" onclick="press(1)">1</div>
      <div class="btn" onclick="press(2)">2</div>
      <div class="btn" onclick="press(3)">3</div>
      <div class="btn dark" onclick="sqrt()">√</div>

      <div class="btn" onclick="press(0)">0</div>
      <div class="btn" onclick="press('.')">.</div>
      <div class="btn orange" onclick="calculate()">=</div>

      <!-- FIXED -->
      <div class="btn dark" onclick="clearDisplay()">CE</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">

<header>
  <div class="logo" onclick="goHome()">YouTube+</div>
  <input id="searchInput">
  <button onclick="search()">Search</button>
</header>

<div class="feed" id="feed"></div>

</div>

<script>
let input = "";

function press(v) {
  input += v;
  document.getElementById("display").innerText = input || "0";

  if (input === "9999") unlock();
  if (input.length > 12) input = "";
}

function clearDisplay() {
  input = "";
  document.getElementById("display").innerText = "0";
}

function calculate() {
  try {
    input = eval(input).toString();
  } catch {
    input = "";
  }
  document.getElementById("display").innerText = input || "0";
}

function square() {
  input = (eval(input) ** 2).toString();
  document.getElementById("display").innerText = input;
}

function sqrt() {
  input = Math.sqrt(eval(input)).toString();
  document.getElementById("display").innerText = input;
}

function unlock() {
  document.getElementById("lockScreen").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadHome();
}

/* FETCH */
async function fetchVideos(q="") {
  const res = await fetch(
    "https://youtube-reco.charlieprenticemc.workers.dev/feed?q=" + encodeURIComponent(q)
  );
  const data = await res.json();
  return data.items || [];
}

/* RENDER */
function render(videos) {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  videos.forEach(v => {
    if (!v || !v.id) return;

    feed.innerHTML += `
      <div>
        <iframe src="https://www.youtube.com/embed/${v.id}" allowfullscreen></iframe>
        <p>${v.snippet?.title || ""}</p>
      </div>
    `;
  });
}

/* SEARCH */
async function search() {
  const q = document.getElementById("searchInput").value;
  if (!q) return;

  const vids = await fetchVideos(q);
  render(vids);
}

/* HOME */
async function loadHome() {
  const vids = await fetchVideos("");
  render(vids);
}

function goHome() {
  document.getElementById("searchInput").value = "";
  loadHome();
}
</script>

</body>
</html>
