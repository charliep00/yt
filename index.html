<!DOCTYPE html>
<html>
<head>
  <title>YouTube Feed+</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    header {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px 20px;
      background: #0f0f0f;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      color: red;
      font-weight: bold;
      font-size: 20px;
      cursor: pointer; /* 👈 makes it clickable */
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      background: red;
      color: white;
      cursor: pointer;
    }

    .feed {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 180px;
      border-radius: 10px;
      border: none;
    }

    h3 {
      font-size: 14px;
      margin: 8px 0;
    }

    .center {
      text-align: center;
      margin-top: 100px;
    }
  </style>
</head>

<body>

<header>
  <!-- 👇 CLICKABLE LOGO -->
  <div class="logo" onclick="goHome()">YouTube+</div>

  <input id="searchInput" placeholder="Search YouTube...">
  <button onclick="search()">Search</button>
</header>

<div id="welcome" class="center"></div>
<div class="feed" id="feed"></div>

<script>
let profile = JSON.parse(localStorage.getItem("profile")) || {
  searches: [],
  categories: {}
};

function save() {
  localStorage.setItem("profile", JSON.stringify(profile));
}

function getCategory(title) {
  title = title.toLowerCase();
  if (title.includes("music")) return "music";
  if (title.includes("game")) return "gaming";
  if (title.includes("news")) return "news";
  return "general";
}

function track(title) {
  const cat = getCategory(title);
  profile.categories[cat] = (profile.categories[cat] || 0) + 1;
  save();
}

async function fetchVideos(query) {
  const res = await fetch(
    "https://youtube-reco.charlieprenticemc.workers.dev/feed?q=" + encodeURIComponent(query)
  );
  const data = await res.json();
  return data.items || [];
}

function render(videos) {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  videos.forEach(v => {
    const id = v.id.videoId;
    const title = v.snippet.title;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
      <h3>${title}</h3>
    `;

    div.onclick = () => track(title);

    feed.appendChild(div);
  });
}

async function search() {
  const query = document.getElementById("searchInput").value;
  if (!query) return;

  profile.searches.push(query);
  save();

  const videos = await fetchVideos(query);
  render(videos);

  document.getElementById("welcome").innerHTML = "";
}

async function loadHome() {
  const welcome = document.getElementById("welcome");

  if (profile.searches.length === 0) {
    welcome.innerHTML = "<h2>Search something to start your feed</h2>";
    document.getElementById("feed").innerHTML = "";
    return;
  }

  const lastSearch = profile.searches[profile.searches.length - 1];
  const videos = await fetchVideos(lastSearch);
  render(videos);

  welcome.innerHTML = "<h3>Recommended for you (based on your searches)</h3>";
}

/* 👇 NEW FUNCTION */
function goHome() {
  document.getElementById("searchInput").value = "";
  loadHome();
}

loadHome();
</script>

</body>
</html>
