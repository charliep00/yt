<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <title>YouTube Feed+</title>

  <style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a2e, #0f0f0f);
    color: white;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px;
    background: rgba(20, 20, 20, 0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .logo {
    width: 28px;
    height: 28px;
  }

  .title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: bold;
  }

  .search-box {
    margin-top: 10px;
    display: flex;
    gap: 10px;
  }

  input {
    padding: 8px;
    border-radius: 8px;
    border: none;
    width: 200px;
  }

  button {
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #ff0000;
    color: white;
  }

  .feed {
    padding: 25px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .card {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 10px;
    backdrop-filter: blur(12px);
    transition: 0.3s ease;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .card:hover {
    transform: translateY(-6px);
  }

  iframe {
    width: 100%;
    height: 200px;
    border-radius: 12px;
    border: none;
  }

  h3 {
    font-size: 14px;
    margin: 10px 5px 5px;
    color: #ddd;
  }
  </style>
</head>

<body>

<header>
  <div class="title">
    <svg class="logo" viewBox="0 0 24 24" fill="red">
      <path d="M10 15l5.19-3L10 9v6z"/>
    </svg>
    YouTube Feed+
  </div>

  <div class="search-box">
    <input id="searchInput" placeholder="Search videos..." />
    <button onclick="searchVideos()">Search</button>
  </div>
</header>

<div class="feed" id="feed"></div>

<script>

let userProfile = JSON.parse(localStorage.getItem("profile")) || {
  categories: {},
  searches: [],
  seen: {}
};

function saveProfile() {
  localStorage.setItem("profile", JSON.stringify(userProfile));
}

function getCategory(title) {
  title = title.toLowerCase();

  if (title.includes("music")) return "music";
  if (title.includes("game")) return "gaming";
  if (title.includes("tech") || title.includes("ai")) return "tech";
  if (title.includes("news")) return "news";

  return "general";
}

function trackVideo(category, id) {
  userProfile.categories[category] =
    (userProfile.categories[category] || 0) + 1;

  userProfile.seen[id] = true;
  saveProfile();
}

function getTopCategory() {
  let top = null;
  let max = 0;

  for (let c in userProfile.categories) {
    if (userProfile.categories[c] > max) {
      max = userProfile.categories[c];
      top = c;
    }
  }
  return top;
}

let loading = false;
let currentQuery = null;

// REQUIRE SEARCH FIRST
if (userProfile.searches.length === 0) {
  document.getElementById("feed").innerHTML =
    "<p style='text-align:center;'>Search something to start</p>";
}

async function searchVideos() {
  const query = document.getElementById("searchInput").value.trim();
  if (!query) return;

  currentQuery = query;
  userProfile.searches.push(query);
  saveProfile();

  document.getElementById("feed").innerHTML = "";
  loadVideos(true);
}

window.addEventListener("scroll", () => {
  if (loading || !currentQuery) return;

  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
    loadVideos();
  }
});

async function loadVideos(reset = false) {
  try {
    loading = true;

    let url = "https://youtube-reco.charlieprenticemc.workers.dev/feed";

    if (currentQuery) {
      url += "?q=" + encodeURIComponent(currentQuery);
    }

    const res = await fetch(url);
    const data = await res.json();

    const feed = document.getElementById("feed");

    if (!data.items) {
      feed.innerHTML = "<p>No videos found</p>";
      loading = false;
      return;
    }

    const topCategory = getTopCategory();

    // PERSONALIZATION SORT
    let videos = data.items.filter(v => !userProfile.seen[v.id]);

    if (topCategory) {
      videos.sort((a, b) => {
        const aMatch = getCategory(a.snippet.title) === topCategory;
        const bMatch = getCategory(b.snippet.title) === topCategory;
        return bMatch - aMatch;
      });
    }

    videos.forEach(video => {
      const videoId = video.id;
      const title = video.snippet.title;
      const category = getCategory(title);

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
        <h3>${title}</h3>
      `;

      div.onclick = () => trackVideo(category, videoId);

      feed.appendChild(div);
    });

    loading = false;

  } catch (err) {
    console.error(err);
    loading = false;
  }
}

</script>

</body>
</html>
